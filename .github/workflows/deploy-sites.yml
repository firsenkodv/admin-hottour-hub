name: Deploy Sites

on:
  workflow_dispatch:

jobs:
  deploy-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Debug SSH connection
        run: |
          echo "--- key fingerprint ---"
          ssh-keygen -lf ~/.ssh/deploy_key || echo "FINGERPRINT FAILED - key file is malformed"
          echo "--- verbose connection test ---"
          ssh -vv -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo CONNECTION_OK" || true

      - name: Sync files via rsync
        run: |
          rsync -rltz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='/vendor' \
            --exclude='storage/app/public' \
            --exclude='storage/logs' \
            --exclude='storage/framework/sessions' \
            --exclude='storage/framework/cache' \
            --exclude='storage/framework/views' \
            --exclude='public/storage' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.HUB_APP_PATH }}/

      - name: Post-deploy tasks
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            APP_PATH="${{ secrets.HUB_APP_PATH }}"
            HTTPDOCS_PATH="${{ secrets.HUB_HTTPDOCS_PATH }}"
            OWNER="admin.hottur.uz:psaserv"
            PHP_BIN="/opt/plesk/php/8.3/bin/php"
            COMPOSER="/opt/psa/var/modules/composer/composer.phar"

            cd "$APP_PATH"

            COMPOSER_ALLOW_SUPERUSER=1 $PHP_BIN $COMPOSER install --no-dev --optimize-autoloader --no-interaction

            $PHP_BIN artisan migrate --force
            $PHP_BIN artisan config:clear
            $PHP_BIN artisan view:clear

            # Plesk: symlink'и как document root не работают на этом хостинге,
            # поэтому public/ копируется в httpdocs как обычные файлы, а index.php
            # нужно перепатчить на абсолютные пути после каждого такого копирования.
            cp -rL public/. "$HTTPDOCS_PATH/"
            rm -f "$HTTPDOCS_PATH/storage"

            cat > "$HTTPDOCS_PATH/index.php" << PHP_EOF
            <?php

            use Illuminate\Foundation\Application;
            use Illuminate\Http\Request;

            define('LARAVEL_START', microtime(true));

            \$appPath = '$APP_PATH';

            if (file_exists(\$maintenance = \$appPath.'/storage/framework/maintenance.php')) {
                require \$maintenance;
            }

            require \$appPath.'/vendor/autoload.php';

            /** @var Application \$app */
            \$app = require_once \$appPath.'/bootstrap/app.php';

            \$app->handleRequest(Request::capture());
            PHP_EOF

            chown -R "$OWNER" "$APP_PATH"
            chown -R "$OWNER" "$HTTPDOCS_PATH"

